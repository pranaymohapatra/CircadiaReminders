micronaut:
  server:
    context-path: /api/v1
  application:
    name: circadiaReminders
    security:
      enabled: true
      authentication: bearer
      token:
        jwt:
          signatures:
            secret:
              generator: # This defines the signature key
                secret: "${JWT_GENERATOR_SIGNATURE_SECRET:pleaseChangeThisToAStrongSecret2026}"
                jws-algorithm: HS256
        generator:
          access-token:
            expiration: 3600 # 1 hour in seconds
          refresh-token:
            enabled: true
            expiration: 2592000 # 30 days in seconds
        endpoints:
          login:
            enabled: true
            path: /login # Will be /api/v1/login
          oauth:
            enabled: true
            path: /auth/refresh # Will be /api/v1/oauth/access_token
  router:
    static-resources:
      jsonschema:
        paths: classpath:META-INF/schemas
        mapping: /schemas/**
datasources:
  default:
    driver-class-name: org.postgresql.Driver
    db-type: postgres
    dialect: POSTGRES
    url: jdbc:postgresql://localhost:5432/flowclock
    username: ${DB_USERNAME:flowclock_user}
    password: ${DB_PASSWORD:flowclock_password}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
      max-lifetime: 1800000
      leak-detection-threshold: 60000
      pool-name: FlowClockHikariPool
flyway:
  datasources:
    default:
      enabled: true
      locations: classpath:db/migration
      baseline-on-migrate: true
      validate-on-migrate: true
      out-of-order: false
